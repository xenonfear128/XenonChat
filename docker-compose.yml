services:
  postgres:
    image: postgres:16-alpine
    container_name: xenonchat-postgres
    environment:
      POSTGRES_USER: xenon
      POSTGRES_PASSWORD: xenon
      POSTGRES_DB: xenonchat
    ports:
      - "5432:5432"
    volumes:
      - xenon_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xenon -d xenonchat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: xenonchat-redis
    ports:
      - "6379:6379"
    volumes:
      - xenon_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: xenonchat-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - xenon_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/xenonchat || true;
      mc anonymous set download local/xenonchat/public || true;
      exit 0;
      "

volumes:
  xenon_pg_data:
  xenon_redis_data:
  xenon_minio_data:
